version: "3.9"

services:
  db:
    image: postgres:15
    container_name: meuct_db
    restart: always
    environment:
      POSTGRES_USER: meuct
      POSTGRES_PASSWORD: meuct123
      POSTGRES_DB: meuctdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: meuct_api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://meuct:meuct123@db:5432/meuctdb
      SECRET_KEY: supersecret
      ALGORITHM: HS256
      ADMIN_EMAIL: admin@meuct.com
      ADMIN_PASSWORD: admin123
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: lucasbahr12@gmail.com
      SMTP_PASSWORD: jqzm ypjw rhtw vbmf
    volumes:
      - .:/app
    command: >
      sh -c "sleep 5 &&
            alembic upgrade head &&
            python -m app.scripts.create_admin &&
            uvicorn app.main:app --host 0.0.0.0 --port 8080"

volumes:
  postgres_data:
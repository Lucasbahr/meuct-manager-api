name: CI/CD

on:
  push:
    branches: ["master", "homologation"]
  pull_request:
    branches: ["master", "homologation"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      SECRET_KEY: meuct-secret
      ALGORITHM: HS256
      DATABASE_URL: sqlite:///./test.db
      ADMIN_EMAIL: admin@meuct.com
      ADMIN_PASSWORD: admin123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint
        run: |
          flake8 app || true

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-fail-under=80

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t meuct-api .

      - name: Start docker-compose
        run: |
          docker compose up -d --build

      - name: Wait for API
        run: sleep 20

      - name: Test API health
        run: curl --fail http://localhost:8080/health

      - name: Show docker logs on failure
        if: failure()
        run: docker compose logs --tail=200
        run: curl --fail http://localhost:8080/health

      - name: Show docker logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop containers
        run: docker compose  down

  migrate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Alembic migration
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: ${{ github.ref == 'refs/heads/master' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_HML }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/homologation' && github.event_name == 'push'
    env:
      ENVIRONMENT: ${{ github.ref == 'refs/heads/master' && 'prod' || 'hml' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
        
      - name: Build and Push Image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/meuct/meuct-api:${ENVIRONMENT}-${{ github.sha }}

          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/envs/${{ env.ENVIRONMENT }}
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          
      - name: Terraform Apply
        working-directory: terraform/envs/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_google_credentials: '${{ secrets.GCP_CREDENTIALS }}'
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT }}
          TF_VAR_algorithm: HS256
          TF_VAR_secret_key:  ${{ secrets.SECRET_KEY }}
          TF_VAR_ci_service_account: github-actions-sa@meuct-manager.iam.gserviceaccount.com
          TF_VAR_region: us-central1
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/meuct/meuct-api:${{ env.ENVIRONMENT }}-${{ github.sha }}
          TF_VAR_database_url: ${{ github.ref == 'refs/heads/master' && secrets.DATABASE_URL_PROD || secrets.DATABASE_URL_HML }}
          TF_VAR_smtp_host: smtp.gmail.com
          TF_VAR_smtp_port: 587
          TF_VAR_smtp_user: ${{ secrets.SMTP_USER }}
          TF_VAR_smtp_password: ${{ secrets.SMTP_PASSWORD }}
          TF_VAR_base_url: ${{ secrets.BASE_URL }}
          TF_VAR_mercadopago_oauth_client_id: ${{ secrets.MERCADOPAGO_OAUTH_CLIENT_ID }}
          TF_VAR_mercadopago_oauth_client_secret: ${{ secrets.MERCADOPAGO_OAUTH_CLIENT_SECRET }}
          TF_VAR_mercadopago_oauth_redirect_uri: ${{ secrets.MERCADOPAGO_OAUTH_REDIRECT_URI }}

  release:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' &&  github.event_name == 'push'

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github

      - name: Run semantic-release
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}